<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#9f3e0f">
    <meta name="apple-mobile-web-app-title" content="Crate Grabber">
    <title>CRATE GRABBER • v3.4 • THE STUDIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .graffiti-header { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 700; letter-spacing: -3.5px; }
        .glass { background: rgba(255,255,255,0.055); backdrop-filter: blur(24px); border: 1px solid rgba(251,146,60,0.15); }
        .studio-btn { transition: all 0.2s cubic-bezier(0.23,1,0.32,1); }
        .command-pre { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; background: rgba(15,8,3,0.85); border: 1px solid rgba(251,146,60,0.15); }
        .section-header { font-size: 13px; letter-spacing: 1.5px; font-weight: 600; color: #fb923c; }
        
        .bg-vignette {
            background-image: background-image: linear-gradient(to bottom, rgba(15,8,3,0.52), rgba(25,12,5,0.65)), url('crate-grabber-bg.jpg');, url('crate_grabber_bg.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        
        .slider-row { display: flex; align-items: center; gap: 12px; }
        .slider-row input[type="range"] { flex: 1; accent-color: #fb923c; }
        .slider-value { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 12px; min-width: 52px; text-align: right; color: #fed7aa; }
        .post-control { background: rgba(0,0,0,0.25); border: 1px solid rgba(251,146,60,0.15); border-radius: 16px; padding: 14px 16px; margin-bottom: 8px; }
    </style>
</head>
<body class="warm-gradient text-amber-100 min-h-screen">
    <div class="min-h-screen bg-vignette vignette">

        <!-- Header -->
        <div class="max-w-5xl mx-auto px-6 pt-8 pb-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-11 h-11 rounded-2xl bg-gradient-to-br from-orange-400 to-amber-600 flex items-center justify-center">
                    <i class="fa-solid fa-headset text-white text-3xl"></i>
                </div>
                <div>
                    <h1 class="graffiti-header text-6xl md:text-7xl font-black tracking-[-3.5px] text-amber-100">CRATE GRABBER</h1>
                    <p class="text-[11px] text-amber-400/80 -mt-1 tracking-[3px]">v3.4 • THE STUDIO • iOS A-SHELL POWERED</p>
                </div>
            </div>
            <button onclick="copySetupCommand()" class="px-5 py-2.5 rounded-2xl bg-white/10 hover:bg-white/15 border border-white/20 text-sm font-semibold flex items-center gap-x-2 active:scale-[0.985]">
                <i class="fa-solid fa-terminal"></i> <span>GET A-SHELL SETUP</span>
            </button>
        </div>

        <div class="max-w-5xl mx-auto px-6 pb-12">
            <div class="mb-8 text-center">
                <p class="text-xl text-amber-200/90 max-w-lg mx-auto">Drop URLs • Auto-clean links • More faders • Live AI prompt</p>
            </div>

            <!-- Input Card -->
            <div class="glass rounded-3xl p-8 md:p-10 shadow-2xl">
                <div class="flex flex-wrap gap-2 mb-5">
                    <button onclick="uploadCSV()" class="px-4 py-2 text-xs rounded-2xl bg-white/5 hover:bg-white/10 border border-white/15 flex items-center gap-x-2">Upload CSV</button>
                    <button onclick="uploadImageForOCR()" class="px-4 py-2 text-xs rounded-2xl bg-white/5 hover:bg-white/10 border border-white/15 flex items-center gap-x-2">Upload Image (OCR)</button>
                    <button onclick="clearAll()" class="ml-auto px-4 py-2 text-xs rounded-2xl bg-white/5 hover:bg-white/10 border border-white/15">CLEAR ALL</button>
                </div>

                <div class="mb-6">
                    <div class="section-header mb-2 px-1">URLS (one per line)</div>
                    <textarea id="url-input" rows="5" class="w-full bg-black/40 border border-white/15 focus:border-orange-400/60 rounded-2xl p-5 text-base font-mono" placeholder="https://youtube.com/watch?v=..."></textarea>
                </div>

                <div class="mb-6 flex items-center gap-x-3 px-1">
                    <label class="flex items-center gap-x-2 cursor-pointer text-sm">
                        <input type="checkbox" id="playlist-mode" class="accent-orange-500 w-4 h-4" checked>
                        <span class="font-medium">This is a playlist</span>
                    </label>
                </div>

                <!-- Format -->
                <div class="mb-6">
                    <div class="section-header mb-3 px-1">FORMAT</div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <button onclick="selectFormat('mp3', this)" class="format-btn glass px-5 py-4 rounded-2xl flex flex-col items-center border-2 border-orange-400/70 active" data-format="mp3">🎵 MP3</button>
                        <button onclick="selectFormat('wav', this)" class="format-btn glass px-5 py-4 rounded-2xl flex flex-col items-center border-2 border-white/20" data-format="wav">📼 WAV</button>
                        <button onclick="selectFormat('vid', this)" class="format-btn glass px-5 py-4 rounded-2xl flex flex-col items-center border-2 border-white/20" data-format="vid">🎬 VID</button>
                        <button onclick="selectFormat('vidaud', this)" class="format-btn glass px-5 py-4 rounded-2xl flex flex-col items-center border-2 border-white/20" data-format="vidaud">🎞️ VID + AUD</button>
                    </div>
                </div>

                <button onclick="generateCrateCommand()" class="studio-btn w-full py-7 rounded-3xl bg-gradient-to-r from-orange-500 via-amber-500 to-orange-600 text-white
